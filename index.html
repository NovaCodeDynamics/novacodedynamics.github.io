<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>No More Smoking</title>
  <meta name="description" content="Quit smoking your way — quit now or step by step with gradual programs, craving support, and progress tracking." />
  <meta property="og:title" content="No More Smoking" />
  <meta property="og:description" content="Quit now or step by step." />
  <meta property="og:image" content="app-preview.png" />
  <meta name="theme-color" content="#0f766e" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: #17324d;
      background:
        radial-gradient(circle at 20% 10%, rgba(94, 234, 212, 0.30), transparent 35%),
        radial-gradient(circle at 80% 20%, rgba(186, 230, 253, 0.55), transparent 30%),
        linear-gradient(180deg, #f3fffd 0%, #ffffff 72%);
    }
    .page {
      width: min(100%, 780px);
      margin: 0 auto;
      padding: 48px 22px 34px;
      text-align: center;
    }
    .icon {
      width: 92px;
      height: 92px;
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(15, 118, 110, 0.18);
      margin-bottom: 22px;
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 8vw, 58px);
      line-height: 1.02;
      letter-spacing: -1.8px;
      color: #0f3f46;
      font-weight: 800;
    }
    .tagline {
      margin: 14px auto 0;
      max-width: 590px;
      font-size: clamp(18px, 4.5vw, 25px);
      line-height: 1.35;
      color: #4b6570;
      font-weight: 500;
    }
    .preview {
      width: min(100%, 690px);
      margin: 34px auto 24px;
      display: block;
      filter: drop-shadow(0 26px 52px rgba(15, 63, 70, 0.14));
    }
    .features {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 0 auto 28px;
      max-width: 520px;
      color: #31515a;
      font-size: 17px;
      line-height: 1.25;
    }
    .feature {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(15, 118, 110, 0.10);
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 10px 26px rgba(15, 118, 110, 0.06);
    }
    .open-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(100%, 360px);
      min-height: 62px;
      padding: 0 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      color: white;
      text-decoration: none;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.2px;
      box-shadow: 0 18px 36px rgba(20, 184, 166, 0.28);
    }
    .open-button:active { transform: translateY(1px); }
    .small {
      margin-top: 18px;
      font-size: 13px;
      color: #6b8790;
    }
    .small a {
      color: #0f766e;
      text-decoration: none;
      font-weight: 600;
    }
    @media (max-width: 520px) {
      .page { padding-top: 34px; }
      .icon { width: 78px; height: 78px; border-radius: 20px; }
      .preview { margin-top: 26px; }
      .features { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <img class="icon" src="app-icon.png" alt="No More Smoking app icon" />
    <h1>No More Smoking</h1>
    <p class="tagline">Quit smoking your way — quit now or step by step.</p>
    <img class="preview" src="app-preview.png" alt="No More Smoking app screens" />
    <section class="features" aria-label="App features">
      <div class="feature">Gradual quit programs for people who can’t quit overnight</div>
      <div class="feature">Craving support tools for difficult moments</div>
      <div class="feature">Progress tracking to keep your journey visible</div>
    </section>
    <a class="open-button" href="https://apps.apple.com/ca/app/no-more-smoking/id6757434482">OPEN ON THE APP STORE</a>
    <p class="small">Built by NovaCode Dynamics · <a href="nomoresmoking-support/">Support</a></p>
  </main>
</body>
</html>
